schema_version: 1
server:
  name: LuigiOS
  description: Controller-first open gaming OS community for users, artists, testers, and contributors.
  community_mode: true
  default_notifications: mentions_only
  explicit_media_filter: all_members
  verification_level: medium
  avatar: branding/assets/community/avatar-512.png

roles:
  public: [Contributor, Tester, Artist, Documentation, Packager]
  trusted: [Maintainer, Moderator, Release Manager, Security Responder]
  rule: Trusted roles are assigned manually with the narrowest required permissions.

categories:
  - name: START HERE
    channels:
      - {name: rules, type: text, writable: false, default: true, topic: "Community code, safety boundaries, and where to report concerns."}
      - {name: start-here, type: text, writable: true, default: true, topic: "Current project status, safe first steps, and introductions."}
      - {name: announcements, type: announcement, writable: false, default: true, topic: "Verified releases and project-wide notices only."}
  - name: COMMUNITY
    channels:
      - {name: general, type: text, writable: true, default: true, topic: "Friendly conversation about LuigiOS and open handheld gaming."}
      - {name: help, type: forum, writable: true, default: true, topic: "One question per post; include device, revision, expected result, and what happened."}
      - {name: showcase, type: forum, writable: true, default: true, topic: "Share original builds, setups, art, and demos with credits and honest status."}
      - {name: hardware-lab, type: forum, writable: true, default: true, topic: "Structured test results for devices you physically possess."}
  - name: CONTRIBUTE
    channels:
      - {name: development, type: forum, writable: true, role: Contributor}
      - {name: art-and-ux, type: forum, writable: true, role: Artist}
      - {name: docs-and-localization, type: forum, writable: true, role: Documentation}
      - {name: package-lab, type: forum, writable: true, role: Packager}
      - {name: testing, type: forum, writable: true, role: Tester}
  - name: STAFF
    private: true
    channels:
      - {name: mod-room, type: text}
      - {name: mod-alerts, type: text}
      - {name: incident-response, type: text}
      - {name: release-coordination, type: text}

forum_tags:
  help: [Setup, Desktop, Game Mode, Storage, Controllers, Networking, Audio, Solved]
  development: [RFC, Bug, Package, UX, Security, Needs Review]
  hardware-lab: [LCD, OLED, Docked, Controller, Storage, Suspend, Needs Reproduction]
  showcase: [Setup, Art, UX, Video, Tooling, Work in Progress]

forum_guidelines:
  help: "Search first. Use a descriptive title and include device, LuigiOS revision, expected result, actual result, attempted fixes, and redacted logs. Confirmed bugs move to GitHub."
  development: "Link the durable GitHub issue, discussion, commit, or pull request. Decisions and accepted designs return to GitHub. Never post secrets or embargoed vulnerability details."
  hardware-lab: "Test only hardware you control. Report exact model, firmware, revision, steps, result, and recovery outcome. Remove serial numbers and personal data."
  showcase: "Credit creators, name source and license where applicable, disclose commercial relationships, and label mockups or unfinished work clearly."

onboarding:
  default_channels: [rules, start-here, announcements, general, help, showcase, hardware-lab]
  questions:
    - prompt: What would you like to do here?
      required: true
      multiple: true
      answers:
        - {label: Use LuigiOS, channels: [help, showcase]}
        - {label: Test hardware, roles: [Tester], channels: [testing, hardware-lab]}
        - {label: Build software, roles: [Contributor], channels: [development]}
        - {label: Make art and UX, roles: [Artist], channels: [art-and-ux]}
        - {label: Improve docs, roles: [Documentation], channels: [docs-and-localization]}
        - {label: Package software, roles: [Packager], channels: [package-lab]}
  guide_tasks:
    - Read the community rules.
    - Introduce yourself and what you want to explore.
    - Choose contributor and interest channels.
    - Read the current build status before installing.
  welcome_message: "Welcome to LuigiOS — a home for players and the people who build, test, document, repair, preserve, and design open handheld gaming. Choose what interests you, read the current project status, and ask a clear question when you need help."

automod:
  alerts_channel: mod-alerts
  enable: [harmful_links, spam_content, mention_spam]
  custom_keywords_review_required: true
