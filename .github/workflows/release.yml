name: Draft source release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  source-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Require a matching version tag
        run: test "${GITHUB_REF_NAME}" = "v$(cat VERSION)"
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsdl2-dev
      - name: Run the complete validation gate
        run: ./tools/ci-check
      - name: Build reproducible contributor source archive
        run: ./tools/release-source
      - name: Create human-gated draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --draft \
            --generate-notes \
            --title "Batocera Deck UX ${GITHUB_REF_NAME}" \
            dist/*
