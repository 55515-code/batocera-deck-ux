name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check contribution sign-offs
        if: github.event_name == 'pull_request'
        run: ./tools/check-dco "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsdl2-dev
      - name: Run authoritative gate and create source evidence
        run: ./tools/qualify-source run --output dist/qualification
      - name: Verify source evidence
        run: ./tools/qualify-source verify dist/qualification
      - name: Upload source qualification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: source-qualification-${{ github.sha }}
          path: dist/qualification
          if-no-files-found: warn
          retention-days: 30
