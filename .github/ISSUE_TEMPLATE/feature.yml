name: Feature proposal
description: Propose a focused user experience or platform improvement.
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
    validations:
      required: true
  - type: textarea
    id: upstream
    attributes:
      label: Existing upstream options researched
    validations:
      required: true
  - type: textarea
    id: experience
    attributes:
      label: Controller-first experience
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Data, privilege, update, and rollback impact
    validations:
      required: true
