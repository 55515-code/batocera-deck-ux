name: Bug report
description: Report a reproducible OS, desktop, controller, storage, or emulator integration problem.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Never attach ROMs, BIOS, firmware, keys, credentials, saves, or unredacted private logs.
  - type: input
    id: image
    attributes:
      label: Image version or commit
    validations:
      required: true
  - type: dropdown
    id: deck
    attributes:
      label: Steam Deck model
      options: [LCD, OLED, Other x86_64 hardware]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: hardware
    attributes:
      label: Dock, display, and controllers
  - type: textarea
    id: logs
    attributes:
      label: Redacted diagnostics
